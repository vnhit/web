<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKS. | Urban Precision Footwear</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    
    <link rel="stylesheet" href="css/pages/home.css">
    <link rel="stylesheet" href="css/pages/product.css">

</head>
<body>

    <div id="app-header"></div>

    <main class="home-page">
        
        <section class="hero-section">
            <div class="hero-content">
                <h1 class="display-lg" id="hero-title">
                    </h1>
                <p class="body-md text-gray" id="hero-subtitle"></p>
                
                <div class="hero-actions" id="hero-buttons">
                    </div>
            </div>
            
            <div class="hero-visual">
                <div class="tilted-square" id="hero-image-container">
                    </div>
            </div>
        </section>

        <div class="brand-ticker">
            <div class="ticker-content" id="home-brand-ticker">
                </div>
        </div>

        <section class="trending-section">
            <div class="section-header">
                <div>
                    <span class="label-sm text-primary">SEASONAL SELECTION</span>
                    <h2 class="headline-sm">TRENDING NOW</h2>
                </div>
                <a href="products.html" class="link-underline">VIEW ALL PRODUCTS</a>
            </div>

            <div class="home-product-grid" id="home-trending-list">
                </div>
        </section>

        <section class="promo-section">
            <div class="promo-visual" id="promo-image-container">
                </div>
            
            <div class="promo-content">
                <span class="label-sm text-primary" id="promo-tag"></span>
                <h2 class="display-lg" style="font-size: 3rem; margin-top: 8px;" id="promo-title"></h2>
                <p class="body-md text-gray" style="margin: 24px 0;" id="promo-desc"></p>
                
                <a href="#" class="link-underline text-primary" id="promo-link-text"></a>
            </div>
        </section>

    </main>

    <div id="app-footer"></div>
    <script src="js/toast.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
